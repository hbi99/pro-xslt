<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>XSLT Processor</title>

	<!-- Design Liquido Branding Meta Tags -->
	<meta name="description" content="Interactive XSLT transformation testing tool by Design Liquido">
	<meta property="og:title" content="XSLT Processor - Interactive Test">
	<meta property="og:description" content="Interactive XSLT transformation testing tool by Design Liquido">
	<meta property="og:image" content="https://designliquido.github.io/imagens/logo-og.png">
	<meta property="og:url" content="https://designliquido.github.io/">
	<meta property="og:site_name" content="Design Liquido">

	<!-- Favicon -->
	<link rel="icon" type="image/png" href="https://designliquido.github.io/imagens/logo.png">

	<!-- Inter Font -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

	<script src="tailwindcss-3.4.17.js"></script>
	<script>
		tailwind.config = {
			darkMode: 'class',
			theme: {
				extend: {
					fontFamily: {
						sans: ['Inter', 'sans-serif'],
					},
					colors: {
						editor: {
							bg: '#1e1e1e',
							border: '#3c3c3c'
						}
					}
				}
			}
		}
	</script>
	<style>
		body {
			font-family: 'Inter', sans-serif;
		}
		.gradient-bg {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
		}
		.dark .gradient-bg {
			background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
		}
		.glass-effect {
			backdrop-filter: blur(15px);
			-webkit-backdrop-filter: blur(15px);
		}
		.glow {
			box-shadow: 0 0 30px rgba(102, 126, 234, 0.4);
		}
		.dark .glow {
			box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
		}
		.theme-toggle {
			position: fixed;
			top: 1rem;
			right: 1rem;
			z-index: 50;
		}
		.editor-container {
			height: 600px;
			border: 1px solid #3c3c3c;
			border-radius: 0.375rem;
			overflow: hidden;
		}
		.output-editor {
			height: 350px;
		}
	</style>
</head>
<body class="gradient-bg text-gray-100 min-h-screen">
	<div class="container mx-auto px-4 py-8 max-w-7xl">
		<!-- Input Section -->
		<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
			<!-- XML Input -->
			<div>
				<div class="flex items-center justify-between mb-2">
					<label class="text-sm font-medium text-gray-300">XML Input</label>
					<span class="text-xs text-gray-500 font-mono">XML</span>
				</div>
				<div id="xml-editor" class="editor-container"></div>
			</div>

			<!-- XSLT Input -->
			<div>
				<div class="flex items-center justify-between mb-2">
					<label class="text-sm font-medium text-gray-300">XSLT Stylesheet</label>
					<span class="text-xs text-gray-500 font-mono">XML</span>
				</div>
				<div id="xslt-editor" class="editor-container"></div>
			</div>
		</div>

		<!-- Transform Button -->
		<div class="flex justify-center mb-6">
			<button
				id="transform-btn"
				onclick="transformXslt()"
				class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transition-all duration-200 flex items-center gap-2"
			>
				<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
					<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
					<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
				</svg>
				Transform
			</button>
		</div>

		<!-- Output Section -->
		<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
			<!-- HTML Output -->
			<div>
				<div class="flex items-center justify-between mb-2">
					<label class="text-sm font-medium text-gray-300">HTML Output</label>
					<span class="text-xs text-gray-500 font-mono">HTML</span>
				</div>
				<div id="html-editor" class="editor-container output-editor"></div>
			</div>

			<!-- Rendered Preview -->
			<div>
				<div class="flex items-center justify-between mb-2">
					<label class="text-sm font-medium text-gray-300">Rendered Preview</label>
					<span class="text-xs text-gray-500">Live</span>
				</div>
				<div
					id="preview"
					class="output-editor bg-white text-gray-900 rounded-md p-4 overflow-auto border border-gray-600"
				>
					<p class="text-gray-400 italic">Output will appear here...</p>
				</div>
			</div>
		</div>

		<!-- Error Display -->
		<div id="error-container" class="hidden mt-6">
			<div class="bg-red-900/50 border border-red-500 rounded-lg p-4">
				<div class="flex items-center gap-2 mb-2">
					<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
					</svg>
					<span class="font-semibold text-red-400">Error</span>
				</div>
				<pre id="error-message" class="text-red-300 text-sm whitespace-pre-wrap"></pre>
			</div>
		</div>
	</div>

	<!--
	  Load pro-xslt *before* Monaco's loader. Monaco registers AMD `define`, and UMD bundles
	  prefer the AMD branch when define.amd is set — then they never assign globalThis.ProXslt.
	-->
	<script src="dist/pro-xslt.umd.js"></script>

	<!-- Monaco Editor -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

	<script>
		let xmlEditor, xsltEditor, htmlEditor;

		const defaultXml = `<page><n>10</n><n>2</n><n>30</n></page>`;

// <xsl:output method="html" omit-xml-declaration="yes"/>
// <xsl:strip-space elements="*"/>
// <xsl:template match="text()" />

		const defaultXslt = `<xsl:stylesheet xmlns:xsl="http://www.w3.org/1999/XSL/Transform">
              <xsl:template match="/page">
                  <xsl:for-each select="n">
                      <xsl:sort select="." data-type="number" order="descending" />
                      <xsl:value-of select="." />
                      <xsl:if test="position() &lt; last()">
                          <xsl:text> - </xsl:text>
                      </xsl:if>
                  </xsl:for-each>
              </xsl:template>
          </xsl:stylesheet>`;

		// Initialize Monaco Editor
		require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

		require(['vs/editor/editor.main'], function () {
			// Define editor theme
			monaco.editor.defineTheme('xslt-dark', {
				base: 'vs-dark',
				inherit: true,
				rules: [],
				colors: {
					'editor.background': '#1e1e1e',
				}
			});

			const commonOptions = {
				theme: 'xslt-dark',
				minimap: { enabled: false },
				fontSize: 14,
				lineNumbers: 'on',
				scrollBeyondLastLine: false,
				automaticLayout: true,
				tabSize: 4,
				insertSpaces: true,
				wordWrap: 'on',
				padding: { top: 10 }
			};

			xmlEditor = monaco.editor.create(document.getElementById('xml-editor'), {
				...commonOptions,
				value: defaultXml,
				language: 'xml'
			});

			xsltEditor = monaco.editor.create(document.getElementById('xslt-editor'), {
				...commonOptions,
				value: defaultXslt,
				language: 'xml'
			});

			htmlEditor = monaco.editor.create(document.getElementById('html-editor'), {
				...commonOptions,
				value: '',
				language: 'html',
				readOnly: true
			});

			// Keyboard shortcut: Ctrl+Enter to transform
			document.addEventListener('keydown', (e) => {
				if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
					e.preventDefault();
					transformXslt();
				}
			});
		});

		async function transformXslt() {
			let xmlDoc = ProXslt.xmlFromString(xmlEditor.getValue());
			let xsltDoc = ProXslt.xmlFromString(xsltEditor.getValue());

			let processor = new globalThis.ProXslt();
			processor.importStylesheet(xsltDoc);

			let fragment = processor.transformToFragment(xmlDoc, document);
            let span = document.createElement('span');
            span.appendChild(fragment);
			
			htmlEditor.setValue(span.innerHTML);
			preview.innerHTML = span.innerHTML;
		}

		setTimeout(transformXslt, 500);

	</script>
</body>
</html>
