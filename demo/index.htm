<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro-XSLT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="css/site.css" rel="stylesheet">
<script src="js/junior.js"></script>
<script src="js/site.js"></script>
</head>
<body>

<div class="layout">
	<div class="toolbar">
		<div class="layout-left">
			<span class="tool button">Tree</span>
		</div>
		<div class="layout-middle">
			<span class="tool options">
				<span>XML</span>
				<span>XSL</span>
				<span>Output</span>
			</span>
		</div>
		<div class="layout-right">
			<span class="tool toggle">Theme</span>
		</div>
	</div>
	<div class="divider locked"></div>
	<div class="workarea">
		<div class="sidebar"></div>
		<div class="divider vertical"></div>
		<div class="xml-doc"></div>
		<div class="divider vertical"></div>
		<div class="xslt-doc"></div>
	</div>
	<div class="divider horisontal"></div>
	<div class="output"></div>
	<div class="footer">
		<div class="layout-left">Created with <3 in Sweden</div>
		<div class="layout-middle"></div>
		<div class="layout-right">
			Powered by <a href="//github.com/hbi99/pro-xslt" target="_new">Pro-XSLT</a>
		</div>
	</div>
</div>

</body>
</html>
