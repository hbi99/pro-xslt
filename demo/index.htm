<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro-XSLT | Hakan Bilgin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Design Liquido Branding Meta Tags -->
<meta name="description" content="Interactive XSLT transformation testing tool by Hakan Bilgin">
<meta property="og:title" content="Pro-XSLT - Interactive Test">
<meta property="og:description" content="Interactive XSLT transformation testing tool by Hakan Bilgin">
<meta property="og:image" content="https://hbi99.github.io/img/logo.png">
<meta property="og:url" content="https://hbi99.github.io/">
<meta property="og:site_name" content="Hakan Bilgin">
<link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
<link rel="icon" href="img/favicon.ico" type="image/x-icon">
<link href="css/site.css" rel="stylesheet">
<script src="js/codemirror/codemirror.js"></script>
<script src="js/codemirror/mode/xml.js"></script>
<script src="js/junior.js"></script>
<script src="../dist/pro-xslt.umd.js"></script>
<script src="js/app.js" type="module"></script>
</head>
<body data-theme="dark1">

<div class="layout">
	<div class="toolbar" data-area="toolbar">
		<div class="layout-left">
			<span class="tool button" data-click="toggle-sidebar">
				<i class="icon-tree"></i>
			</span>
		</div>
		<div class="layout-middle">
			<span class="tool options" data-click="set-processor">
				<label class="disabled">Processor</label>
				<span data-arg="pro-xslt" class="on">Pro-Xslt</span>
				<span data-arg="native">Native</span>
			</span>
		</div>
		<div class="layout-right">
			<span class="tool toggle" data-click="toggle-theme">
				<i class="icon-sun"></i>
				<span>Theme</span>
				<i class="icon-brightness-contrast"></i>
			</span>
		</div>
	</div>
	<div class="divider locked"></div>
	<div class="middle">
		<div class="sidebar" data-area="sidebar" data-click="select-tree-item">
			<!-- tree goes here -->
		</div>
		<div class="divider vertical"></div>
		<div class="editors">
			<div class="workarea">
				<div class="xml-doc" data-area="editor">
					<textarea><!-- XML code goes here --></textarea>
				</div>
				<div class="divider vertical"></div>
				<div class="xslt-doc" data-area="editor">
					<textarea><!-- XSLT code goes here --></textarea>
				</div>
			</div>
			<div class="divider horisontal">
				<span class="tool options" data-click="set-output-mode" data-area="output">
					<span data-arg="html" class="on">HTML</span>
					<span data-arg="rendered">Rendered</span>
				</span>
			</div>
			<div class="output" data-area="output" data-view="html">
				<div class="html">
					<textarea><!-- transformed HTML output goes here --></textarea>
				</div>
				<div class="rendered">
					<textarea><!-- rendered output goes here --></textarea>
				</div>
			</div>
		</div>
	</div>
	<div class="footer">
		<div class="layout-left">Created with <i class="icon-heart"></i> in Sweden</div>
		<div class="layout-middle" title="Hakan Bilgin">
			<i class="icon-hb"></i>
		</div>
		<div class="layout-right">
			Powered by <a href="//github.com/hbi99/pro-xslt" target="_new">Pro-XSLT</a>
		</div>
	</div>
</div>

</body>
</html>
