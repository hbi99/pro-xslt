name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack dist artifacts
        run: |
          tar -czf pro-xslt-dist.tar.gz dist
          zip -r pro-xslt-dist.zip dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pro-xslt-dist.tar.gz
            pro-xslt-dist.zip
          generate_release_notes: true

